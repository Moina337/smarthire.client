<div class="min-h-screen flex bg-gray-100">

  <!-- SIDEBAR -->
  <aside
    class="w-64 bg-white shadow-lg hidden md:flex flex-col">

    <!-- LOGO -->
    <div class="p-6 border-b">

      <h1 class="text-2xl font-bold text-blue-600">

        SmartHire

      </h1>

      <p class="text-gray-500 text-sm">

        Espace candidat

      </p>

    </div>

    <!-- MENU -->
    <nav class="flex-1 p-4 space-y-2">

      <a
        routerLink="/candidate/dashboard"
        routerLinkActive="bg-blue-50 text-blue-600"
        class="block px-4 py-3 rounded-lg hover:bg-gray-100">

        🏠 Dashboard

      </a>

      <a
        routerLink="/candidate/profile"
        routerLinkActive="bg-blue-50 text-blue-600"
        class="block px-4 py-3 rounded-lg hover:bg-gray-100">

        👤 Mon profil

      </a>

      <a
        routerLink="/candidate/applications"
        routerLinkActive="bg-blue-50 text-blue-600"
        class="block px-4 py-3 rounded-lg hover:bg-gray-100">

        📄 Mes postulations

      </a>

    </nav>

    <!-- LOGOUT -->
    <div class="p-4 border-t">

      <button
        (click)="logout()"
        class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-lg">

        Déconnexion

      </button>

    </div>

  </aside>

  <!-- MAIN -->
  <div class="flex-1 flex flex-col">

    <!-- HEADER -->
    <header
      class="bg-white shadow px-6 py-4 flex justify-between items-center">

      <div>

        <h2 class="text-lg font-semibold">

          Espace candidat

        </h2>

        <p class="text-sm text-gray-500">

          Gérez votre profil et vos candidatures

        </p>

      </div>

    </header>

    <!-- PAGE CONTENT -->
    <main class="flex-1 p-6">

      <router-outlet></router-outlet>

    </main>

  </div>

</div>
