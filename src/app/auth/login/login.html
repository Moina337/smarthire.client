<section class="min-h-screen flex items-center justify-center bg-gray-50">

    <div class="bg-white p-8 rounded-2xl shadow w-full max-w-md">

        <!-- TITLE -->
        <h1 class="text-2xl font-bold mb-6 text-center">
            Connexion
        </h1>

        <!-- FORM -->
        <div class="space-y-4">

            <input
                [(ngModel)]="email"
                type="email"
                placeholder="Email"
                class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500">

            <input
                [(ngModel)]="password"
                type="password"
                placeholder="Mot de passe"
                class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500">

            <button
                (click)="login()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg transition">

                Se connecter

            </button>

        </div>

        <!-- REGISTER LINK -->
        <div class="mt-6 text-center">

            <p class="text-gray-500">

                Pas encore de compte ?

                <a
                    routerLink="/register"
                    class="text-blue-600 font-medium hover:underline">

                    Créer un compte

                </a>

            </p>

        </div>

    </div>

</section>
