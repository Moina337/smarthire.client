<section class="min-h-screen flex items-center justify-center bg-gray-50">

    <div class="bg-white p-8 rounded-2xl shadow w-full max-w-md">

        <h1 class="text-2xl font-bold mb-6 text-center">
            Connexion
        </h1>

        <div class="space-y-4">

            <input
                [(ngModel)]="email"
                type="email"
                placeholder="Email"
                class="w-full border rounded-lg p-3">

            <input
                [(ngModel)]="password"
                type="password"
                placeholder="Mot de passe"
                class="w-full border rounded-lg p-3">

            <button
                (click)="login()"
                class="w-full bg-blue-600 text-white p-3 rounded-lg">

                Se connecter

            </button>

        </div>

    </div>

</section>
