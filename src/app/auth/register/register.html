<section class="min-h-screen bg-gray-50 flex items-center justify-center p-6">

    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">

        <!-- TITLE -->
        <div class="text-center mb-8">

            <h1 class="text-3xl font-bold text-gray-800">
                Créer un compte
            </h1>

            <p class="text-gray-500 mt-2">
                Rejoignez SmartHire
            </p>

        </div>

        <!-- ERROR -->
        @if(errorMessage){

        <div class="bg-red-100 text-red-600 p-3 rounded-lg mb-4">

            {{ errorMessage }}

        </div>

        }

        <!-- FORM -->
        <div class="space-y-4">

            <!-- NOM -->
            <input [(ngModel)]="nom" type="text" placeholder="Nom complet"
                class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">

            <!-- EMAIL -->
            <input [(ngModel)]="email" type="email" placeholder="Adresse email"
                class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">

            <!-- PASSWORD -->
            <input [(ngModel)]="password" type="password" placeholder="Mot de passe"
                class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">

            <!-- BUTTON -->
            <button (click)="register()" [disabled]="loading"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition">

                @if(!loading){

                Créer un compte

                }

                @if(loading){

                Inscription...

                }

            </button>

        </div>

        <!-- LOGIN LINK -->
        <div class="text-center mt-6">

            <p class="text-gray-500">

                Déjà un compte ?

                <a routerLink="/login" class="text-blue-600 hover:underline">

                    Se connecter

                </a>

            </p>

        </div>

    </div>

</section>
