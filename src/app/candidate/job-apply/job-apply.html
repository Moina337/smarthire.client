<section class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <div class="bg-white p-6 rounded-2xl shadow-sm max-w-md w-full">
    <h1 class="text-xl font-bold mb-4 text-gray-900">Postuler à l'offre #{{ jobId }}</h1>
    <p class="text-sm text-slate-600 mb-4">Votre candidature sera envoyée pour l'offre sélectionnée.</p>
    <button (click)="apply()" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition">Postuler</button>
  </div>
</section>
