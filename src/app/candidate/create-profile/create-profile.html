<section class="min-h-screen bg-slate-50 flex items-center justify-center p-4 sm:p-6">
  <div class="w-full max-w-lg">

    <!-- En-tête -->
    <div class="text-center mb-6">
      <div class="inline-flex w-12 h-12 bg-blue-600 rounded-2xl items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        </svg>
      </div>
      <h1 class="text-xl font-semibold text-slate-900">Créez votre profil</h1>
      <p class="text-sm text-slate-500 mt-1">Présentez votre profil professionnel aux recruteurs</p>
    </div>

    <!-- Carte formulaire -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 sm:p-8">

      <!-- Message d'erreur -->
      @if(errorMessage) {
        <div class="flex items-start gap-3 bg-red-50 border border-red-100 text-red-700 p-3.5 rounded-xl mb-5">
          <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
          </svg>
          <p class="text-sm">{{ errorMessage }}</p>
        </div>
      }

      <div class="space-y-5">

        <!-- Titre professionnel -->
        <div>
          <label class="block text-xs font-medium text-slate-700 mb-1.5">
            Titre professionnel
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0 1 12 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 0 1-.673-.38m0 0A2.18 2.18 0 0 1 3 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 0 1 3.413-.387m7.5 0V5.25A2.25 2.25 0 0 0 13.5 3h-3a2.25 2.25 0 0 0-2.25 2.25v.894m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
            </div>
            <input
              [(ngModel)]="titreProfil"
              type="text"
              placeholder="Ex : Développeur Backend Java"
              class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-900 placeholder-slate-400
                     border border-slate-200 rounded-xl
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                     hover:border-slate-300 transition-colors" />
          </div>
        </div>

        <!-- Expérience -->
        <div>
          <label class="block text-xs font-medium text-slate-700 mb-1.5">
            Années d'expérience
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
              </svg>
            </div>
            <input
              [(ngModel)]="experience"
              type="number"
              min="0"
              max="50"
              placeholder="Ex : 3"
              class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-900 placeholder-slate-400
                     border border-slate-200 rounded-xl
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                     hover:border-slate-300 transition-colors" />
          </div>
        </div>

        <!-- Compétences -->
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="text-xs font-medium text-slate-700">Compétences</label>
            <span class="text-xs text-slate-400">Séparées par des virgules</span>
          </div>
          <div class="relative">
            <div class="absolute top-3 left-3 pointer-events-none">
              <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z" />
              </svg>
            </div>
            <textarea
              [(ngModel)]="competences"
              rows="3"
              placeholder="Spring Boot, Java, Angular, Docker..."
              class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-900 placeholder-slate-400
                     border border-slate-200 rounded-xl resize-none
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                     hover:border-slate-300 transition-colors">
            </textarea>
          </div>
          <p class="text-xs text-slate-400 mt-1.5 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z" />
            </svg>
            Exemple : Spring Boot, Java, Angular, Docker, PostgreSQL
          </p>
        </div>

        <!-- Bouton soumettre -->
        <button
          (click)="createProfile()"
          [disabled]="loading"
          class="w-full flex items-center justify-center gap-2
                 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 disabled:cursor-not-allowed
                 text-white text-sm font-medium
                 py-3 rounded-xl transition-colors mt-2">

          @if(loading) {
            <!-- Spinner SVG animé (pas de dépendance externe) -->
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 00-8 8h4z"/>
            </svg>
            Création en cours...
          } @else {
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
            Créer mon profil
          }
        </button>

      </div>
    </div>

    <!-- Lien retour -->
    <p class="text-center text-xs text-slate-400 mt-4">
      Déjà un profil ?
      <a routerLink="/candidate/profile" class="text-blue-600 hover:text-blue-700 font-medium">Voir mon profil →</a>
    </p>

  </div>
</section>
