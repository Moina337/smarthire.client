<section class="space-y-6">
  <div class="flex items-center justify-between gap-4">
    <div>
      <h2 class="text-2xl font-semibold text-slate-900">{{ isEdit() ? 'Modifier l’offre' : 'Créer une offre' }}</h2>
      <p class="text-slate-500">Formulaire de création ou de mise à jour d’une offre SmartHire.</p>
    </div>
    <a routerLink="/admin/jobs" class="rounded-full border border-slate-200 px-4 py-2 text-sm">Retour</a>
  </div>

  @if (loading()) {
    <p class="text-sm text-slate-500">Chargement du formulaire...</p>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm space-y-6">
    <div class="grid gap-6 md:grid-cols-2">
      <label class="block text-sm text-slate-700">
        <span class="mb-2 block font-medium">Titre</span>
        <input formControlName="titre" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-blue-400 focus:ring-2 focus:ring-blue-100" />
      </label>

      <label class="block text-sm text-slate-700">
        <span class="mb-2 block font-medium">Expérience minimale</span>
        <input type="number" formControlName="experienceMin" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-blue-400 focus:ring-2 focus:ring-blue-100" />
      </label>
    </div>

    <label class="block text-sm text-slate-700">
      <span class="mb-2 block font-medium">Description</span>
      <textarea formControlName="description" rows="5" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-blue-400 focus:ring-2 focus:ring-blue-100"></textarea>
    </label>

    <label class="block text-sm text-slate-700">
      <span class="mb-2 block font-medium">Compétences requises</span>
      <input formControlName="competencesRequises" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-blue-400 focus:ring-2 focus:ring-blue-100" />
      <span class="mt-2 block text-xs text-slate-500">Séparez les compétences par des virgules.</span>
    </label>

    <div class="flex justify-end gap-3">
      <a routerLink="/admin/jobs" class="rounded-full border border-slate-200 px-4 py-2 text-sm">Annuler</a>
      <button type="submit" class="rounded-full bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-700">{{ isEdit() ? 'Mettre à jour' : 'Créer l’offre' }}</button>
    </div>
  </form>
</section>
