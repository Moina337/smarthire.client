<section class="bg-gray-50 min-h-screen p-6">

    <div class="max-w-4xl mx-auto">

        @if(job(); as j){

        <div class="bg-white rounded-2xl shadow-sm p-8">

            <!-- HEADER -->
            <div class="flex flex-col md:flex-row md:justify-between gap-4">

                <div>

                    <h1 class="text-3xl font-bold text-gray-800">
                        {{ j.titre }}
                    </h1>

                    <p class="text-gray-500 mt-2">
                        Opportunité professionnelle
                    </p>

                </div>

                <div>

                    <span class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-sm">

                        {{ j.experienceMin }} ans d'expérience

                    </span>

                </div>

            </div>

            <!-- DESCRIPTION -->
            <div class="mt-8">

                <h2 class="text-xl font-semibold mb-3">
                    Description
                </h2>

                <p class="text-gray-600 leading-7">
                    {{ j.description }}
                </p>

            </div>

            <!-- SKILLS -->
            <div class="mt-8">

                <h2 class="text-xl font-semibold mb-3">
                    Compétences requises
                </h2>

                <div class="flex flex-wrap gap-2">

                    @for(skill of j.competencesRequises; track skill){

                    <span class="bg-gray-100 text-gray-700 px-3 py-2 rounded-full">

                        {{ skill }}

                    </span>

                    }

                </div>

            </div>

            <!-- ACTION -->
            <div class="mt-10 flex gap-4">

                <button
                 [routerLink]="['/jobs', j.id, 'apply']"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition">

                    Postuler

                </button>

                <button
                    onclick="history.back()"
                    class="border border-blue-600 text-blue-600 hover:bg-blue-50 px-6 py-3 rounded-lg transition">

                    Retour

                </button>

            </div>

        </div>

        } @else {

        <div class="text-center py-20">

            <p class="text-gray-500">
                Chargement...
            </p>

        </div>

        }

    </div>

</section>
